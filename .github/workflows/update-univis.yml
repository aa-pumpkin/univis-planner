name: Update UnivIS data

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-univis-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Download current and upcoming CAU semesters
        run: npm run data:update
      - name: Verify imported data and application
        run: npm run data:validate && npm test && npm run build
      - name: Commit changed public data
        run: |
          if git diff --quiet -- public/data src/data/generated; then
            echo "UnivIS data did not change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data src/data/generated
          git commit -m "chore(data): update UnivIS snapshot"
          git push
